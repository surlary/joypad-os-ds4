# Adafruit Feather nRF52840 Express board-specific config
#
# The Feather ships with the Adafruit UF2 bootloader (SoftDevice s140 v6 layout).
# Zephyr's default DTS uses MCUboot partitions — the overlay replaces them with
# the correct UF2 layout (code at 0x26000).
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BOOTLOADER_MCUBOOT=n
